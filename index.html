<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>將村手作甜點 | 宅配訂購單</title>
    <style>
        :root {
            /* 🎨 全新配色：呼應將村 Logo 🎨 */
            --bg-paper: #xFDF5E6;          /* 宣紙米白，作為輕柔背景 */
            --text-indigo: #x191970;       /* 墨藍色 (代替吉卜力啡)，用於書法感文字 */
            --accent-cinnabar: #xD32F2F;   /* 硃砂紅 (代替吉卜力綠)，作為主強調色與按鈕 */
            --berry-red: #x8B4367;         /* 深莓果色 (用於副強調文字) */
            --error-red: #xD32F2F;
            --line-green: #x06C755;         /* LINE 綠保留 */
        }

        body { 
            font-family: -apple-system, "Noto Sans TC", sans-serif; 
            background-color: var(--bg-paper); 
            color: var(--text-indigo); 
            margin: 0; padding: 0;
            /* 構圖：增加宣紙與墨痕感 */
            background-image: 
                linear-gradient(rgba(253, 245, 230, 0.95), rgba(253, 245, 230, 0.95)),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><path d="M0,0h100v100h-100v-100zm50,0c10,0 20,10 30,20c10,10 20,20 30,30c10,10 0,20 -10,30c-10,10 -20,20 -30,30c-10,10 -20,10 -30,0c-10,-10 -20,-20 -30,-30c-10,-10 -10,-20 -10,-30c0,-10 10,-20 20,-30zm10,10c5,0 10,5 15,10c5,5 10,10 15,15c5,5 0,10 -5,15c-5,5 -10,10 -15,15c-5,5 -10,5 -15,0c-5,-5 -10,-10 -15,-15c-5,-5 -5,-10 -5,-15c0,-5 5,-10 10,-15z" fill="rgba(122,53,88,0.02)"/></svg>'); /* 輕微的宣紙墨點紋理 */
            background-attachment: fixed;
        }

        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding: 20px; box-sizing: border-box; padding-bottom: 120px; }
        
        .header-section { text-align: center; margin-bottom: 25px; }
        
        /* ✅ 修改重點：Logo 周圍加上毛筆刷痕般的硃砂紅光暈 */
        .logo-img { 
            width: 150px; height: 150px; 
            border-radius: 50%; 
            border: 4px solid white; 
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.3); /* 硃砂紅光暈，呼應紅色圓圈 */
            object-fit: cover; 
            margin: 0 auto 10px; 
            display: block; 
            /* 增加毛筆刷痕般的邊框效果 */
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><circle cx="50" cy="50" r="48" fill="white" stroke="black" stroke-width="2" stroke-dasharray="10 5"/></svg>');
        }
        
        h1 { color: var(--accent-cinnabar); font-size: 1.4rem; margin: 0; text-shadow: 1px 1px 0px white; }

        .page { display: none; width: 100%; }
        .page.active { display: block !important; animation: inkFadeIn 0.5s ease-out; }
        /* 如同水墨在紙上暈開的動畫 */
        @keyframes inkFadeIn { from { opacity: 0; transform: scale(1.02) translateY(5px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* ✅ 修改重點：卡片改為毛玻璃宣紙質感，邊框具有水墨刷痕 */
        .card { 
            background: rgba(255, 255, 255, 0.85); 
            padding: 20px; 
            border-radius: 20px; 
            border: 3px solid rgba(25, 25, 112, 0.1); /* 墨藍色輕微邊框 */
            box-shadow: 0 8px 25px rgba(25, 25, 112, 0.05); /* 墨色陰影 */
            margin-bottom: 20px; 
            backdrop-filter: blur(5px); /* 毛玻璃效果 */
            position: relative;
        }
        /* 卡片宣紙墨點質感裝飾 */
        .card::before {
            content: '';
            position: absolute; inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><path d="M0,0h100v100h-100v-100zm50,0c10,0 20,10 30,20c10,10 20,20 30,30c10,10 0,20 -10,30c-10,10 -20,20 -30,30c-10,10 -20,10 -30,0c-10,-10 -20,-20 -30,-30c-10,-10 -10,-20 -10,-30c0,-10 10,-20 20,-30z" fill="rgba(122,53,88,0.01)"/></svg>');
            pointer-events: none;
            border-radius: 20px;
        }

        .form-group { margin-bottom: 18px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.95rem; color: var(--text-indigo); }
        
        /* ✅ 修改重點：輸入框背景清晰化，白色底，墨藍色邊框 */
        input { 
            width: 100%; height: 50px; font-size: 1.1rem; padding: 0 15px; 
            border: 3px solid var(--text-indigo); /* 墨藍色粗邊框 */
            background-color: #FFFFFF !important; /* 強制純白底色 */
            color: #333; 
            border-radius: 12px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--accent-cinnabar); outline: none; box-shadow: 0 0 10px rgba(211, 47, 47, 0.3); }
        
        .input-error { border-color: var(--error-red) !important; background-color: #FFF5F5 !important; }
        .error-msg { color: var(--error-red); font-size: 0.85rem; margin-top: 6px; display: none; font-weight: bold; }

        /* 品項列表改為硃砂紅+墨藍色搭配 */
        .flavor-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(25, 25, 112, 0.1); }
        .flavor-info strong { color: var(--text-indigo); font-size: 1.1rem; }
        .flavor-info small { color: #555; }
        
        .qty-control { display: flex; align-items: center; gap: 8px; }
        /* +/- 按鈕改為硃砂紅 */
        .qty-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--accent-cinnabar); color: white; font-size: 1.5rem; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 5px rgba(211, 47, 47, 0.3); }
        .qty-input { width: 70px; text-align: center; border: 2px solid var(--text-indigo); border-radius: 10px; height: 36px; font-size: 1.2rem; font-weight: bold; background: white; color: var(--text-indigo); }
        .subtotal-tag { min-width: 65px; text-align: right; color: var(--accent-cinnabar); font-weight: bold; }

        /* ✅ 修改重點：硃砂紅卡片風格 */
        .shipping-card { margin-top: 15px; padding: 15px; background: #FFF9FA; border-radius: 20px; border: 2px dashed var(--accent-cinnabar); text-align: center; }

        /* 導航按鈕硃砂紅漸層 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); padding: 15px 20px; box-shadow: 0 -5px 15px rgba(25, 25, 112, 0.05); display: flex; gap: 10px; max-width: 500px; margin: 0 auto; z-index: 999; border-radius: 20px 20px 0 0; backdrop-filter: blur(10px); }
        .btn { flex: 1; height: 55px; border-radius: 30px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        /* 強調按鈕：硃砂紅 */
        .btn-primary { 
            background: linear-gradient(135deg, #xD32F2F 0%, #x800000 100%); 
            color: white; 
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.3);
        }
        .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(211, 47, 47, 0.3); }
        
        .btn-secondary { background: #E0E0E0; color: var(--text-indigo); flex: 0.4; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        /* 彈窗邊框具有硃砂紅墨痕 */
        .modal-body { background: white; padding: 25px; border-radius: 30px; border: 4px solid var(--accent-cinnabar); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(211, 47, 47, 0.3); background-image: radial-gradient(circle at 10% 10%, var(--bg-paper) 0%, rgba(255,255,255,0) 80%); }
        .modal h3, .confirm-title { color: var(--accent-cinnabar); font-size: 1.5rem; text-shadow: 1px 1px 0px white; }
        
        /* 複製帳號按鈕硃砂紅墨藍感 */
        .copy-btn { margin-top: 10px; width: 100%; border: 1.5px solid var(--text-indigo); border-radius: 8px; padding: 10px; cursor: pointer; background: white; color: var(--text-indigo); font-weight: bold; }
        .copy-btn:active { background: var(--bg-paper); }

        .line-btn { display: flex; align-items: center; justify-content: center; background: #06C755; color: white; padding: 12px; border-radius: 25px; text-decoration: none; font-weight: bold; margin: 10px 0; }
        
        /* ✅ 修改重點：明細中的 hr 改為硃砂紅墨痕 */
        hr { border: 0; border-top: 2px dashed var(--accent-cinnabar); margin: 15px 0; opacity: 0.5; }

        /* 箱數確認樣式 */
        #confirm-text b { color: var(--accent-cinnabar); font-size: 1.8rem; }
    </style>
</head>

            <div class="form-group"><label>🏠 宅配詳細地址</label><input type="text" id="address" maxlength="50" placeholder="送到您府上的地址" oninput="validateField(this)"><div class="error-msg" id="address-error">需含縣市、區、路街、號及樓層</div></div>

    </div>

        <div class="card">
            <div id="item-list"></div>
            <div class="shipping-card">
